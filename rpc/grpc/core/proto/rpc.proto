message GetConnectionsRequestMessage{
  bool includeProfileData = 1;
}

message ConnectionsProfileData {
  double cpuUsage = 1;
  uint64 memoryUsage = 2;
}

message GetConnectionsResponseMessage{
  uint32 clients = 1;
  uint32 peers = 2;
